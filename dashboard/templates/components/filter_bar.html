<div class="card bg-base-100 shadow border border-base-300">
    <div class="card-body">

        <form method="get" class="[&_input]:input [&_input]:input-bordered [&_input]:w-full [&_select]:select [&_select]:select-bordered [&_select]:w-full [&_textarea]:textarea [&_textarea]:textarea-bordered [&_textarea]:w-full">

            <div class="flex items-center justify-between mb-4">
                <h2 class="card-title text-base">
                    Filters
                </h2>

                {% if request.GET and request.GET.urlencode %}
                    <span class="badge badge-primary badge-outline">
                        Active
                    </span>
                {% endif %}
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">

                {% for field in filter.form.visible_fields %}
                    <div class="form-control">
                        <label class="label py-1">
                            <span class="label-text">{{ field.label }}</span>
                        </label>
                        {{ field }}
                        {% if field.errors %}
                            <label class="label py-1">
                                <span class="label-text-alt text-error">{{ field.errors|striptags }}</span>
                            </label>
                        {% endif %}
                    </div>
                {% endfor %}

            </div>

            <div class="mt-6 flex gap-2">

                <button class="btn btn-info">
                    Apply Filters
                </button>

                <a href="." class="btn btn-ghost">
                    Reset
                </a>

            </div>

        </form>

    </div>
</div>
