{% extends "base.html" %}
{% block content %}
    <div class="min-h-[70vh] flex items-center justify-center">
        <div class="bg-white shadow-xl rounded-xl p-8 max-w-lg w-full text-center">
            <!-- Success Icon -->
            <div class="flex justify-center mb-4">
                <div class="h-16 w-16 rounded-full bg-green-100 flex items-center justify-center">
                    <svg class="h-8 w-8 text-green-600"
                         fill="none"
                         stroke="currentColor"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
            <!-- Message -->
            <h1 class="text-2xl font-semibold text-gray-800 mb-2">Publication Submitted Successfully</h1>
            <p class="text-gray-600 mb-6">Your publication data has been saved successfully.</p>
            <!-- Action -->
            <a href="{% url 'publications:wos_upload' %}"
               class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition">
                Click here to submit more publications
            </a>
        </div>
    </div>
{% endblock %}
