{% extends "base.html" %}
{% block title %}Email Sent{% endblock %}
{% block content %}
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-8 text-center">
        <h1 class="text-2xl font-bold mb-4">Check Your Inbox</h1>

        <p class="text-gray-600 mb-4">
            We’ve emailed you instructions for resetting your password.
            <br><br>
            If the email does not arrive, please check your spam folder.
        </p>

        <a href="{% url 'accounts:login' %}"
           class="bg-blue-600 text-white px-4 py-2 rounded inline-block hover:bg-blue-700">
            Back to Login
        </a>
    </div>
{% endblock %}
