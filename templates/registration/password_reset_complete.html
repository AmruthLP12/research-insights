{% extends "base.html" %}
{% block title %}Password Reset Successful{% endblock %}
{% block content %}
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-8 text-center">
        <h1 class="text-2xl font-bold mb-4">Password Reset Successful</h1>
        <p class="text-gray-600 mb-4">Your password has been set. You can now log in with your new password.</p>
        <a href="{% url 'accounts:login' %}"
           class="bg-green-600 text-white px-4 py-2 rounded inline-block hover:bg-green-700">Login</a>
    </div>
{% endblock %}
